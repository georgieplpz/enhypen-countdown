<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cuenta regresiva ENHYPEN</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#0f0f1a,#1b1b38,#3b1d5e);
overflow:hidden;
color:white;
text-align:center;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:.25;
animation:mover 40s linear infinite;
}

@keyframes mover{
from{transform:translateY(0);}
to{transform:translateY(-40px);}
}

.caja{
position:relative;
padding:35px;
border-radius:25px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
width:90%;
max-width:420px;
}

h1{
font-size:2rem;
margin-bottom:10px;
}

p{
margin-bottom:25px;
opacity:.9;
}

#contador{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.bloque{
background:rgba(255,255,255,.12);
padding:15px 10px;
border-radius:15px;
}

.numero{
font-size:2rem;
font-weight:bold;
}

.texto{
font-size:.8rem;
margin-top:5px;
opacity:.8;
}

@media(max-width:500px){
.numero{
font-size:1.6rem;
}
}
</style>

</head>
<body>

<div class="caja">

<h1>ENHYPEN</h1>

<p>Faltan...</p>

<div id="contador">

<div class="bloque">
<div class="numero" id="dias">0</div>
<div class="texto">Días</div>
</div>

<div class="bloque">
<div class="numero" id="horas">0</div>
<div class="texto">Horas</div>
</div>

<div class="bloque">
<div class="numero" id="minutos">0</div>
<div class="texto">Minutos</div>
</div>

<div class="bloque">
<div class="numero" id="segundos">0</div>
<div class="texto">Segundos</div>
</div>

</div>

</div>

<script>

// CAMBIA ESTA FECHA

const ahora = new Date();

if(diferencia<=0){
document.body.innerHTML="<h1>¡Hoy es el concierto! 🎉</h1>";
return;
}

const dias=Math.floor(diferencia/(1000*60*60*24));
const horas=Math.floor((diferencia/(1000*60*60))%24);

const segundos=Math.floor((diferencia/1000)%60);

actualizar();

</script>

</body>
</html>
