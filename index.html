<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENHYPEN - BLOOD SAGA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#090102 0%,#170205 20%,#2d050b 45%,#4a0913 70%,#6d0e1d 100%);
overflow:hidden;
color:white;
text-align:center;
padding:20px;
}

body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
opacity:.45;
background-image:
radial-gradient(circle at 8% 15%, rgba(255,255,255,.9) 1px, transparent 2px),
radial-gradient(circle at 22% 80%, rgba(255,220,220,.7) 1.5px, transparent 2.5px),
radial-gradient(circle at 40% 30%, rgba(255,255,255,.8) 1px, transparent 2px),
radial-gradient(circle at 63% 10%, rgba(255,220,220,.6) 2px, transparent 3px),
radial-gradient(circle at 78% 55%, rgba(255,255,255,.9) 1px, transparent 2px),
radial-gradient(circle at 90% 25%, rgba(255,220,220,.7) 1.5px, transparent 2.5px),
radial-gradient(circle at 15% 55%, rgba(255,255,255,.6) 2px, transparent 3px),
radial-gradient(circle at 55% 85%, rgba(255,220,220,.8) 1px, transparent 2px),
radial-gradient(circle at 72% 75%, rgba(255,255,255,.8) 1.5px, transparent 2.5px),
radial-gradient(circle at 95% 92%, rgba(255,220,220,.7) 1px, transparent 2px);
animation:parpadeo 6s ease-in-out infinite alternate;
}

body::after{
content:"";
position:fixed;
width:550px;
height:550px;
border-radius:50%;
background:radial-gradient(circle,rgba(180,0,40,.22),transparent 70%);
filter:blur(35px);
animation:pulse 6s ease-in-out infinite;
}

@keyframes parpadeo{
0%{
opacity:.25;
}
50%{
opacity:.45;
}
100%{
opacity:.3;
}
}

@keyframes pulse{
50%{transform:scale(1.15);}
}

#intro{
position:fixed;
inset:0;
background:#040000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
animation:fadeOut .9s ease 2.6s forwards;
}

#intro h1{
font-size:3rem;
letter-spacing:8px;
color:#fff;
}

#intro p{
letter-spacing:6px;
color:#d58b97;
margin-top:12px;
}

#intro .bar{
width:220px;
height:8px;
background:#2a1115;
border-radius:99px;
margin-top:25px;
overflow:hidden;
}

#intro .fill{
height:100%;
width:0;
background:#d61f46;
animation:load 2.3s linear forwards;
}

@keyframes load{
to{width:100%;}
}

@keyframes fadeOut{
to{
opacity:0;
visibility:hidden;
}
}

.caja{
position:relative;
z-index:2;
max-width:430px;
width:100%;
padding:35px;
border-radius:24px;
background:rgba(35,5,10,.55);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);
border:1px solid rgba(255,90,90,.18);
box-shadow:0 0 40px rgba(180,0,40,.3);
overflow:hidden;
}

0%,100%{
transform:scale(1);
filter:blur(8px);
}

50%{
transform:scale(1.08);
filter:blur(12px);
}

}

h2{
font-size:2.3rem;
letter-spacing:5px;
color:#ffe8ea;
}

.sub{
margin-top:8px;
color:#ffb8c2;
letter-spacing:4px;
}

.msg{
margin:20px 0 24px;
color:#f6d7db;
line-height:1.6;
transition:opacity .8s ease;
}

#contador{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.b{
background:rgba(120,15,35,.35);
padding:16px 8px;
border-radius:16px;
border:1px solid rgba(255,120,120,.15);
transition:.5s;
}

.n{
font-size:2rem;
font-weight:bold;
color:#fff2f3;
transition:.5s;
}

.t{
font-size:.8rem;
color:#f3c9cf;
margin-top:6px;
}

.footer{
margin-top:20px;
color:#dfb4ba;
font-size:.82rem;
}

@media(max-width:500px){

h2{
font-size:2rem;
}

.n{
font-size:1.6rem;
}

}
</style>

</head>

<body>

<div id="intro">
<h1>ENHYPEN</h1>
<p>BLOOD SAGA</p>
<div class="bar"><div class="fill"></div></div>
</div>

<div class="caja">

<h2>ENHYPEN</h2>

<div class="sub">BLOOD SAGA</div>

<div class="msg" id="mensaje">
Cada segundo que pasa es un segundo menos para ver el resultado de todo tu esfuerzo. ❤️
</div>

<div id="contador">
<div class="b"><div class="n" id="dias">0</div><div class="t">Días</div></div>
<div class="b"><div class="n" id="horas">00</div><div class="t">Horas</div></div>
<div class="b"><div class="n" id="minutos">00</div><div class="t">Minutos</div></div>
<div class="b"><div class="n" id="segundos">00</div><div class="t">Segundos</div></div>
</div>

<div class="footer">14 · JULIO · 2026 · 7:30 PM (CDMX)</div>

</div>

<script>
const fecha = new Date(2026,6,14,19,30,0);

const diasEl=document.getElementById('dias');
const horasEl=document.getElementById('horas');
const minutosEl=document.getElementById('minutos');
const segundosEl=document.getElementById('segundos');

function actualizar(){

 const ahora=new Date();
 const d=fecha-ahora;

 if(d<=0){
  clearInterval(contador);
  document.body.innerHTML=`
  <div style="display:flex;justify-content:center;align-items:center;height:100vh;width:100%;background:#100103;color:white;text-align:center;font-family:Arial;padding:20px;">
    <div>
      <h1>❤️ ¡Hoy es el concierto! ❤️</h1>
      <p>Todo el esfuerzo valió la pena. Ahora disfruta cada canción y crea recuerdos inolvidables.</p>
    </div>
  </div>`;
  return;
 }

 const dias=Math.floor(d/86400000);
 const horas=Math.floor((d/3600000)%24);
 const minutos=Math.floor((d/60000)%60);
 const segundos=Math.floor((d/1000)%60);

 diasEl.textContent=dias;
 horasEl.textContent=String(horas).padStart(2,"0");
 minutosEl.textContent=String(minutos).padStart(2,"0");
 segundosEl.textContent=String(segundos).padStart(2,"0");
}

let contador;

actualizar();

contador = setInterval(actualizar,1000);
 
setTimeout(()=>{
 const intro=document.getElementById("intro");
 if(intro) intro.remove();
},3600);

// Mensajes que cambian cada 10 segundos
const mensajes = [
"❤️ Cada segundo que pasa es un segundo menos para ver el resultado de todo tu esfuerzo",
"🤍 Te amo honguito",
"✨ Cada vez falta menos para ese día",
"🤍 Estoy muy orgulloso de ti amor",
"❤️ Solo prométeme una cosa amor: disfrútalo mucho"
];

const mensaje = document.getElementById("mensaje");

let indice = 0;

setInterval(() => {

    mensaje.style.opacity = "0";

   setTimeout(() => {
    indice = (indice + 1) % mensajes.length;
    mensaje.innerHTML = mensajes[indice];
    mensaje.style.opacity = "1";
}, 800);

}, 10000);

</script>

</body>
</html>
