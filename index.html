<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ENHYPEN - BLOOD SAGA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(
180deg,
#090102 0%,
#170205 20%,
#2d050b 45%,
#4a0913 70%,
#6d0e1d 100%
);
overflow:hidden;
color:white;
text-align:center;
padding:20px;
}

/* Estrellas */
body::before{
content:"";
position:absolute;
inset:0;
background-image:
radial-gradient(rgba(255,220,220,.85) 1px, transparent 1px);
background-size:40px 40px;
opacity:.25;
animation:mover 40s linear infinite;
}

/* Brillo rojo */
body::after{
content:"";
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle, rgba(180,0,40,.25), transparent 70%);
filter:blur(40px);
animation:latido 6s ease-in-out infinite;
}

@keyframes mover{
from{transform:translateY(0);}
to{transform:translateY(-40px);}
}

@keyframes latido{
0%,100%{transform:scale(1);}
50%{transform:scale(1.15);}
}

.caja{
position:relative;
z-index:2;
padding:35px;
border-radius:25px;
background:rgba(35,5,10,.55);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);
border:1px solid rgba(255,90,90,.18);
box-shadow:0 0 40px rgba(180,0,40,.30);
width:100%;
max-width:430px;
}

h1{
font-size:2.4rem;
letter-spacing:5px;
color:#ffe8ea;
text-shadow:0 0 20px rgba(255,70,70,.35);
margin-bottom:8px;
}

.subtitulo{
letter-spacing:4px;
font-size:.95rem;
color:#ffb8c2;
margin-bottom:18px;
}

.mensaje{
font-size:.95rem;
line-height:1.6;
color:#f6d7db;
margin-bottom:25px;
}

#contador{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.bloque{
background:rgba(120,15,35,.35);
padding:15px 10px;
border-radius:16px;
border:1px solid rgba(255,120,120,.15);
transition:.3s;
}

.bloque:hover{
transform:translateY(-3px);
background:rgba(150,20,40,.45);
}

.numero{
font-size:2.1rem;
font-weight:bold;
color:#fff2f3;
text-shadow:0 0 10px rgba(255,80,80,.45);
}

.texto{
margin-top:5px;
font-size:.8rem;
color:#f3c9cf;
}

.footer{
margin-top:22px;
font-size:.8rem;
color:#e3b6bc;
opacity:.9;
}

@media(max-width:500px){

.caja{
padding:28px 20px;
}

h1{
font-size:2rem;
}

.numero{
font-size:1.7rem;
}

.mensaje{
font-size:.9rem;
}

}
</style>

</head>

<body>

<div class="caja">

<h1>ENHYPEN</h1>

<div class="subtitulo">
BLOOD SAGA
</div>

<div class="mensaje">
Cada segundo que pasa es un segundo menos para ver el resultado de todo tu esfuerzo. ❤️
</div>

<div id="contador">

<div class="bloque">
<div class="numero" id="dias">0</div>
<div class="texto">Días</div>
</div>

<div class="bloque">
<div class="numero" id="horas">0</div>
<div class="texto">Horas</div>
</div>

<div class="bloque">
<div class="numero" id="minutos">0</div>
<div class="texto">Minutos</div>
</div>

<div class="bloque">
<div class="numero" id="segundos">0</div>
<div class="texto">Segundos</div>
</div>

</div>

<div class="footer">
14 · JULIO · 2026 · 7:30 PM
</div>

</div>

<script>

const fecha = new Date(2026, 6, 14, 19, 30, 0);

<div>
<h1 style="font-size:3rem;margin-bottom:20px;">❤️</h1>
<h2>¡Hoy es el concierto!</h2>
<p style="margin-top:15px;font-size:1.1rem;">

const dias=Math.floor(diferencia/(1000*60*60*24));

document.getElementById("horas").textContent=String(horas).padStart(2,"0");
document.getElementById("minutos").textContent=String(minutos).padStart(2,"0");
document.getElementById("segundos").textContent=String(segundos).padStart(2,"0");

setInterval(actualizar,1000);

</script>

</body>
</html>
